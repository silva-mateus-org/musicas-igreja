<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organizador de Música Litúrgica{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 50%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .auth-container {
            max-width: 380px;
            width: 100%;
            margin: 20px;
        }

        .auth-card {
            background: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #404040;
            overflow: hidden;
        }

        .auth-header {
            background: #333333;
            color: #e0e0e0;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #404040;
        }

        .auth-header h4 {
            margin: 0;
            font-weight: 500;
            color: #ffffff;
        }

        .auth-header i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
            color: #00d4aa;
        }

        .auth-body {
            padding: 2rem;
            background: #2a2a2a;
        }

        .form-label {
            color: #e0e0e0;
            font-weight: 500;
        }

        .form-control {
            background: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 12px 15px;
            color: #e0e0e0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: #1a1a1a;
            border-color: #00d4aa;
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 170, 0.25);
            color: #e0e0e0;
        }

        .form-control::placeholder {
            color: #888888;
        }

        .btn-auth {
            background: linear-gradient(135deg, #00d4aa 0%, #007a5a 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-auth:hover {
            background: linear-gradient(135deg, #00b894 0%, #00695c 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
            color: white;
        }

        .form-text {
            color: #888888;
            font-size: 0.875rem;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background: #3d1a1a;
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
        }

        .alert-warning {
            background: #3d2f1a;
            color: #ffa726;
            border-left: 4px solid #ffa726;
        }

        .alert-success {
            background: #1a3d2e;
            color: #4caf50;
            border-left: 4px solid #4caf50;
        }

        .alert-info {
            background: #1a2d3d;
            color: #42a5f5;
            border-left: 4px solid #42a5f5;
        }

        .is-invalid {
            border-color: #ff6b6b;
        }

        .is-valid {
            border-color: #4caf50;
        }

        /* Animações suaves */
        .auth-card {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading state */
        .btn-auth:disabled {
            background: #555555;
            cursor: not-allowed;
        }

        .btn-auth .spinner-border {
            width: 1rem;
            height: 1rem;
        }

        /* Toast styles */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .custom-toast {
            background: #333333;
            border: 1px solid #404040;
            color: #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .custom-toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .custom-toast.toast-success {
            border-left: 4px solid #4caf50;
        }

        .custom-toast.toast-error {
            border-left: 4px solid #ff6b6b;
        }

        .custom-toast.toast-warning {
            border-left: 4px solid #ffa726;
        }

        .custom-toast.toast-info {
            border-left: 4px solid #42a5f5;
        }

        .toast-header {
            background: #2a2a2a;
            border-bottom: 1px solid #404040;
            color: #e0e0e0;
        }

        .toast-body {
            background: #333333;
            color: #e0e0e0;
        }
    </style>
</head>

<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Sistema de Toast personalizado
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');

            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;

            const iconMap = {
                success: 'bi-check-circle',
                error: 'bi-exclamation-triangle',
                warning: 'bi-exclamation-circle',
                info: 'bi-info-circle'
            };

            const colorMap = {
                success: '#4caf50',
                error: '#ff6b6b',
                warning: '#ffa726',
                info: '#42a5f5'
            };

            toast.innerHTML = `
                <div class="toast-header">
                    <i class="bi ${iconMap[type]} me-2" style="color: ${colorMap[type]}"></i>
                    <strong class="me-auto">Sistema</strong>
                    <button type="button" class="btn-close btn-close-white" onclick="removeToast(this)"></button>
                </div>
                <div class="toast-body">
                    ${message}
                </div>
            `;

            container.appendChild(toast);

            // Mostrar toast
            setTimeout(() => {
                toast.classList.add('show');
            }, 100);

            // Remover automaticamente após 5 segundos
            setTimeout(() => {
                removeToast(toast.querySelector('.btn-close'));
            }, 5000);
        }

        function removeToast(button) {
            const toast = button.closest('.custom-toast');
            toast.classList.remove('show');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 300);
        }

        // Processar flash messages e convertê-las para toasts
        document.addEventListener('DOMContentLoaded', function () {
            {% with messages = get_flashed_messages(with_categories = true) %}
            {% if messages %}
            {% for category, message in messages %}
            setTimeout(() => {
                showToast('{{ message|replace("'", "\\'")|replace('"', '\\"') }}', '{{ "error" if category == "error" else "warning" if category == "warning" else "success" if category == "success" else "info" }}');
            }, 500);
            {% endfor %}
            {% endif %}
            {% endwith %}
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
