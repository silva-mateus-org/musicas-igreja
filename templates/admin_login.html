{% extends "base.html" %}

{% block title %}Login Admin - Organizador de PDFs{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-danger text-white text-center">
                <h4><i class="bi bi-shield-lock"></i> Acesso Administrativo</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin_authenticate') }}">
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha do Administrador</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>
                    <i class="bi bi-info-circle"></i> 
                    Se esqueceu a senha, altere diretamente no banco de dados (tabela admin_settings)
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
