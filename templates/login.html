{% extends "auth_base.html" %}

{% block title %}Login - Organizador de Música Litúrgica{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-music-note-beamed"></i>
        <h4>Organizador de Música Litúrgica</h4>
        <p class="mb-0">Faça login para continuar</p>
    </div>
    <div class="auth-body">
        <form method="POST" action="{{ url_for('login_post') }}" id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus
                    placeholder="Digite seu nome de usuário">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" required
                    placeholder="Digite sua senha">
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-auth">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('loginForm');
        const submitBtn = form.querySelector('button[type="submit"]');
        const usernameField = document.getElementById('username');
        const passwordField = document.getElementById('password');

        // Focus no campo username
        usernameField.focus();

        // Enter no campo senha submete o form
        passwordField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.submit();
            }
        });

        // Loading state no submit
        form.addEventListener('submit', function () {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
        });
    });
</script>
{% endblock %}
