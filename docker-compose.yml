version: '3.8'

services:
  musicas-igreja:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicas-igreja-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
      - DATABASE_PATH=/app/data/pdf_organizer.db
      - UPLOAD_FOLDER=/app/data/uploads
      - ORGANIZED_FOLDER=/app/data/organized
      - LOG_FOLDER=/app/data/logs
    volumes:
      # Dados persistentes
      - musicas_data:/app/data
      # Configuração opcional (se existir)
      - ./config:/app/config:ro
    networks:
      - musicas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.musicas.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.musicas.tls=true"
      - "traefik.http.routers.musicas.tls.certresolver=letsencrypt"
      - "traefik.http.services.musicas.loadbalancer.server.port=5000"

  # Proxy reverso Traefik (opcional para produção)
  traefik:
    image: traefik:v2.10
    container_name: musicas-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard Traefik
    environment:
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_API_INSECURE=true
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_PROVIDERS_DOCKER=true
      - TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT=false
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL:-admin@localhost}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE=/acme.json
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme.json
    networks:
      - musicas-network
    profiles:
      - traefik  # Use: docker-compose --profile traefik up

networks:
  musicas-network:
    driver: bridge

volumes:
  musicas_data:
    driver: local
  traefik_acme:
    driver: local